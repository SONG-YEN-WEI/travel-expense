<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="旅遊記帳">
<link rel="manifest" href="./expense-manifest.json">
<title>旅遊記帳 — 東京2025</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #0a0a1a;
  --surface: #13132a;
  --surface2: #1c1c3a;
  --accent: #6c8ff0;
  --accent2: #4a6fd4;
  --green: #4ecb8d;
  --red: #e05555;
  --yellow: #f0b429;
  --text: #e8eaff;
  --text2: #8890b8;
  --text3: #484870;
  --border: rgba(108,143,240,0.12);
  --border2: rgba(108,143,240,0.22);
  --radius: 14px;
  --radius-sm: 8px;
  --wei: #6c8ff0;
  --fat: #f06ca0;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Hiragino Sans','Noto Sans TC','PingFang TC',sans-serif; overscroll-behavior: none; }
body { display: flex; flex-direction: column; min-height: 100dvh; }

.proxy-toggle { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 8px; }
.proxy-toggle-label { font-size: 14px; color: var(--text); flex: 1; }
.proxy-toggle-switch { width: 40px; height: 22px; border-radius: 11px; background: var(--surface); border: 1.5px solid var(--border2); position: relative; transition: background 0.2s; flex-shrink: 0; }
.proxy-toggle-switch.on { background: var(--accent2); border-color: var(--accent2); }
.proxy-toggle-switch::after { content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%; background: #fff; top: 1px; left: 1px; transition: left 0.2s; }
.proxy-toggle-switch.on::after { left: 21px; }
.proxy-fields { display: none; background: var(--surface2); border: 0.5px solid var(--accent); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; }
.proxy-fields.show { display: block; }
.proxy-person-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 0.5px solid var(--border); }
.proxy-person-row:last-child { border-bottom: none; }
.proxy-person-name { font-size: 14px; color: var(--text); }
.proxy-person-amt { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 6px; padding: 5px 8px; font-size: 15px; color: var(--text); outline: none; font-family: inherit; text-align: right; width: 120px; }
.proxy-badge { display: inline-block; font-size: 10px; background: rgba(108,143,240,0.15); color: var(--accent); border-radius: 4px; padding: 1px 6px; margin-left: 4px; vertical-align: middle; }
.proxy-summary { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
.proxy-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
.proxy-item:last-child { border-bottom: none; }
.proxy-item-icon { width: 32px; height: 32px; background: rgba(108,143,240,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.proxy-item-info { flex: 1; min-width: 0; }
.proxy-item-name { font-size: 13px; color: var(--text); }
.proxy-item-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.proxy-item-amt { font-size: 14px; font-weight: 600; color: var(--accent); }

.status-bar { height: env(safe-area-inset-top,0px); background: var(--bg); }

/* Header */
.header { padding: 14px 18px 12px; background: var(--bg); border-bottom: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: 0.03em; }
.header-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.add-btn { width: 40px; height: 40px; background: var(--accent2); border: none; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 22px; }
.add-btn:active { opacity: 0.8; }

/* Tabs */
.tabs { display: flex; border-bottom: 0.5px solid var(--border2); background: var(--bg); }
.tab { flex: 1; padding: 10px 0 8px; font-size: 13px; font-weight: 500; color: var(--text3); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Scroll body */
.scroll-body { flex: 1; overflow-y: auto; padding: 14px 14px 100px; -webkit-overflow-scrolling: touch; }

/* Budget card */
.budget-card { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.budget-title { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
.budget-main { display: flex; align-items: flex-end; gap: 6px; margin-bottom: 12px; }
.budget-amount { font-size: 32px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
.budget-unit { font-size: 14px; color: var(--text2); margin-bottom: 4px; }
.budget-twd { font-size: 13px; color: var(--text2); margin-left: auto; align-self: flex-end; margin-bottom: 4px; }
.progress-bar { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s; background: var(--accent); }
.progress-fill.warn { background: var(--yellow); }
.progress-fill.over { background: var(--red); }
.budget-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); }

/* Person cards */
.person-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.person-card { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 14px; }
.person-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.person-amt { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
.person-twd { font-size: 11px; color: var(--text2); margin-top: 2px; }
.person-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }

/* Category summary */
.cat-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.cat-icon { width: 34px; height: 34px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.cat-name { flex: 1; font-size: 14px; color: var(--text); }
.cat-amt { font-size: 14px; font-weight: 600; color: var(--text); }
.cat-bar-wrap { height: 3px; background: var(--surface2); border-radius: 99px; margin-top: 4px; }
.cat-bar { height: 100%; border-radius: 99px; background: var(--accent); }

/* Settlement */
.settle-card { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.settle-arrow { display: flex; align-items: center; gap: 10px; }
.settle-person { font-size: 14px; font-weight: 600; }
.settle-amt { font-size: 18px; font-weight: 700; color: var(--green); margin-left: auto; }
.settle-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* Expense list */
.expense-item { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
.expense-item:active { opacity: 0.7; }
.expense-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.expense-info { flex: 1; min-width: 0; }
.expense-name { font-size: 14px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.expense-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.expense-amt { text-align: right; flex-shrink: 0; }
.expense-jpy { font-size: 15px; font-weight: 600; color: var(--text); }
.expense-twd { font-size: 11px; color: var(--text2); margin-top: 1px; }
.day-header { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; padding: 12px 0 4px; }

/* Modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-end; }
.modal-bg.show { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 20px 18px calc(20px + env(safe-area-inset-bottom,0px)); width: 100%; max-height: 92dvh; overflow-y: auto; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; }
.modal-close { width: 32px; height: 32px; background: var(--surface2); border: none; border-radius: 50%; color: var(--text2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.field { margin-bottom: 14px; }
.field-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.04em; }
.field input, .field select { width: 100%; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 11px 12px; font-size: 16px; color: var(--text); outline: none; font-family: inherit; }
.field input::placeholder { color: var(--text3); }
.field select option { background: var(--surface2); }
.cat-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.cat-pick-btn { background: var(--surface2); border: 1.5px solid transparent; border-radius: var(--radius-sm); padding: 10px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; font-size: 20px; }
.cat-pick-btn span { font-size: 10px; color: var(--text2); }
.cat-pick-btn.selected { border-color: var(--accent); background: rgba(108,143,240,0.1); }
.payer-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.payer-btn { background: var(--surface2); border: 1.5px solid transparent; border-radius: var(--radius-sm); padding: 12px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text); }
.payer-btn.selected-wei { border-color: var(--wei); background: rgba(108,143,240,0.1); color: var(--wei); }
.payer-btn.selected-fat { border-color: var(--fat); background: rgba(240,108,160,0.1); color: var(--fat); }
.split-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.split-label { font-size: 13px; color: var(--text); width: 70px; flex-shrink: 0; }
.split-check { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--border2); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.split-check.on { background: var(--accent); border-color: var(--accent); }
.split-pct { flex: 1; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 15px; color: var(--text); outline: none; font-family: inherit; text-align: right; width: 100%; }
.submit-btn { width: 100%; padding: 14px; background: var(--accent2); border: none; border-radius: var(--radius); color: #fff; font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 6px; }
.submit-btn:active { opacity: 0.8; }
.del-btn { width: 100%; padding: 12px; background: none; border: 0.5px solid var(--red); border-radius: var(--radius); color: var(--red); font-size: 14px; font-family: inherit; cursor: pointer; margin-top: 8px; }

/* Bottom nav */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 0.5px solid var(--border2); display: flex; padding-bottom: env(safe-area-inset-bottom,0px); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0; font-size: 10px; color: var(--text3); border: none; background: none; cursor: pointer; }
.nav-item.active { color: var(--accent); }
.nav-item i { font-size: 22px; }

.section-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; margin-top: 4px; }
.empty { text-align: center; padding: 40px 0; color: var(--text3); font-size: 14px; }

/* Budget setup */
.budget-setup { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
.budget-setup-row { display: flex; align-items: center; gap: 10px; }
.budget-setup-label { font-size: 13px; color: var(--text2); flex-shrink: 0; }
.budget-setup-input { flex: 1; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 16px; color: var(--text); outline: none; font-family: inherit; }
.budget-setup-btn { padding: 8px 14px; background: var(--accent2); border: none; border-radius: var(--radius-sm); color: #fff; font-size: 13px; cursor: pointer; white-space: nowrap; }

.rate-row { font-size: 12px; color: var(--text3); text-align: right; margin-bottom: 10px; display: flex; align-items: center; justify-content: flex-end; gap: 6px; }
.rate-refresh { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 14px; }
</style>
</head>
<body>

<div class="status-bar"></div>

<div class="header">
  <div>
    <div class="header-title">🗾 東京記帳</div>
    <div class="header-sub">2025/5/13 – 5/19</div>
  </div>
  <button class="add-btn" onclick="openModal()" aria-label="新增支出">
    <i class="ti ti-plus"></i>
  </button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('summary',this)">總覽</button>
  <button class="tab" onclick="switchTab('list',this)">明細</button>
  <button class="tab" onclick="switchTab('proxy',this)">代購</button>
  <button class="tab" onclick="switchTab('settle',this)">結算</button>
  <button class="tab" onclick="switchTab('settings',this)">設定</button>
</div>

<div class="scroll-body" id="scrollBody">

  <!-- 總覽 -->
  <div id="tab-summary">
    <div class="rate-row">
      匯率 ¥1 = NT$<span id="rateVal">載入中</span>
      <button class="rate-refresh" onclick="fetchRate()" aria-label="更新匯率"><i class="ti ti-refresh"></i></button>
    </div>

    <div class="budget-card" id="budgetCard"></div>

    <div class="section-label">個人花費</div>
    <div class="person-row" id="personRow"></div>

    <div class="section-label">分類統計</div>
    <div id="catSummary"></div>
  </div>

  <!-- 明細 -->
  <div id="tab-list" style="display:none">
    <div id="expenseList"></div>
  </div>

  <!-- 代購 -->
  <div id="tab-proxy" style="display:none">
    <div class="section-label">代購清單</div>
    <div id="proxyList"></div>
  </div>

  <!-- 結算 -->
  <div id="tab-settle" style="display:none">
    <div id="settleContent"></div>
  </div>

  <!-- 設定 -->
  <div id="tab-settings" style="display:none">
    <div class="section-label">預算設定</div>
    <div class="budget-setup">
      <div class="budget-setup-row">
        <span class="budget-setup-label">總預算 ¥</span>
        <input class="budget-setup-input" id="budgetInput" type="number" placeholder="例：100000">
        <button class="budget-setup-btn" onclick="saveBudget()">儲存</button>
      </div>
    </div>

    <div class="section-label" style="margin-top:16px">旅伴</div>
    <div class="budget-setup" style="font-size:14px;color:var(--text2)">
      <div style="display:flex;align-items:center;gap:8px;padding:6px 0">
        <span style="width:10px;height:10px;border-radius:50%;background:var(--wei);flex-shrink:0"></span> 威
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding:6px 0">
        <span style="width:10px;height:10px;border-radius:50%;background:var(--fat);flex-shrink:0"></span> 肥肥豬豬
      </div>
    </div>

    <div class="section-label" style="margin-top:16px">資料管理</div>
    <div class="budget-setup">
      <button onclick="exportData()" style="width:100%;padding:10px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:8px">
        📤 匯出資料（複製JSON）
      </button>
      <button onclick="clearAllData()" style="width:100%;padding:10px;background:none;border:0.5px solid var(--red);border-radius:var(--radius-sm);color:var(--red);font-size:14px;cursor:pointer;font-family:inherit">
        🗑️ 清除所有資料
      </button>
    </div>
  </div>

</div>

<!-- Add expense modal -->
<div class="modal-bg" id="modalBg" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">新增支出</span>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>

    <div class="field">
      <div class="field-label">類別</div>
      <div class="cat-picker" id="catPicker">
        <button class="cat-pick-btn selected" data-cat="餐飲" onclick="selectCat(this)">🍜<span>餐飲</span></button>
        <button class="cat-pick-btn" data-cat="交通" onclick="selectCat(this)">🚃<span>交通</span></button>
        <button class="cat-pick-btn" data-cat="購物" onclick="selectCat(this)">🛍️<span>購物</span></button>
        <button class="cat-pick-btn" data-cat="景點" onclick="selectCat(this)">🎡<span>景點</span></button>
        <button class="cat-pick-btn" data-cat="住宿" onclick="selectCat(this)">🏨<span>住宿</span></button>
        <button class="cat-pick-btn" data-cat="藥妝" onclick="selectCat(this)">💊<span>藥妝</span></button>
        <button class="cat-pick-btn" data-cat="零食" onclick="selectCat(this)">🍡<span>零食</span></button>
        <button class="cat-pick-btn" data-cat="其他" onclick="selectCat(this)">📌<span>其他</span></button>
      </div>
    </div>

    <div class="field">
      <div class="field-label">項目名稱</div>
      <input type="text" id="expenseName" placeholder="例：阿夫利拉麵">
    </div>

    <div class="field">
      <div class="field-label">金額（日圓 ¥）</div>
      <input type="number" id="expenseAmt" placeholder="例：1280" inputmode="numeric" oninput="updateTwdPreview()">
      <div id="twdPreview" style="font-size:12px;color:var(--text2);margin-top:4px;text-align:right"></div>
    </div>

    <div class="field">
      <div class="field-label">付款人</div>
      <div class="payer-picker">
        <button class="payer-btn selected-wei" id="payerWei" onclick="selectPayer('wei')">威</button>
        <button class="payer-btn" id="payerFat" onclick="selectPayer('fat')">肥肥豬豬</button>
      </div>
    </div>

    <div class="field">
      <div class="field-label">分攤</div>
      <div class="split-row">
        <span class="split-label">威</span>
        <button class="split-check on" id="splitWeiCheck" onclick="toggleSplit('wei')"></button>
        <input class="split-pct" id="splitWeiPct" type="number" value="50" min="0" max="100" oninput="syncSplit('wei')"> %
      </div>
      <div class="split-row">
        <span class="split-label">肥肥豬豬</span>
        <button class="split-check on" id="splitFatCheck" onclick="toggleSplit('fat')"></button>
        <input class="split-pct" id="splitFatPct" type="number" value="50" min="0" max="100" oninput="syncSplit('fat')"> %
      </div>
    </div>

    <div class="field">
      <div class="field-label">日期</div>
      <input type="date" id="expenseDate" value="">
    </div>

    <div class="field">
      <div class="field-label">備註（選填）</div>
      <input type="text" id="expenseNote" placeholder="例：澀谷店">
    </div>

    <div class="field">
      <div class="field-label">代購</div>
      <div class="proxy-toggle" onclick="toggleProxy()">
        <span class="proxy-toggle-label">🛍️ 幫別人代購</span>
        <div class="proxy-toggle-switch" id="proxySwitch"></div>
      </div>
      <div class="proxy-fields" id="proxyFields">
        <div style="font-size:12px;color:var(--text2);margin-bottom:8px">填入代購金額（日圓），未填視為不代購</div>
        <div class="proxy-person-row">
          <span class="proxy-person-name">代購對象名稱</span>
        </div>
        <div id="proxyPersonList"></div>
        <div style="margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)">
          <div style="font-size:12px;color:var(--text2);margin-bottom:6px">新增代購對象</div>
          <div style="display:flex;gap:8px">
            <input id="proxyNewName" type="text" placeholder="對方名字" style="flex:1;background:var(--surface);border:0.5px solid var(--border2);border-radius:6px;padding:8px 10px;font-size:14px;color:var(--text);outline:none;font-family:inherit">
            <button onclick="addProxyPerson()" style="padding:8px 12px;background:var(--accent2);border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;white-space:nowrap">新增</button>
          </div>
        </div>
      </div>
    </div>

    <button class="submit-btn" onclick="saveExpense()">儲存</button>
    <button class="del-btn" id="delBtn" style="display:none" onclick="deleteExpense()">刪除此筆</button>
  </div>
</div>

<script>
const PEOPLE = { wei: { name: '威', color: '#6c8ff0' }, fat: { name: '肥肥豬豬', color: '#f06ca0' } };
const CATS = { '餐飲':'🍜','交通':'🚃','購物':'🛍️','景點':'🎡','住宿':'🏨','藥妝':'💊','零食':'🍡','其他':'📌' };
const CAT_COLORS = { '餐飲':'#e05555','交通':'#4a6fd4','購物':'#c84ab0','景點':'#e09a30','住宿':'#3a9de0','藥妝':'#4ecb8d','零食':'#e0c030','其他':'#8890b8' };

let expenses = JSON.parse(localStorage.getItem('expenses') || '[]');
let budget = parseInt(localStorage.getItem('budget') || '0');
let rate = parseFloat(localStorage.getItem('rate') || '0');
let proxyPeople = JSON.parse(localStorage.getItem('proxyPeople') || '[]');
let currentTab = 'summary';
let editingId = null;
let selectedCat = '餐飲';
let selectedPayer = 'wei';
let splitWeiOn = true, splitFatOn = true;
let proxyOn = false;
let proxyAmounts = {}; // { name: amount }

// Init
window.addEventListener('load', () => {
  document.getElementById('expenseDate').value = new Date().toISOString().slice(0,10);
  if (budget) document.getElementById('budgetInput').value = budget;
  fetchRate();
  render();
});

// Rate
async function fetchRate() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/JPY');
    const d = await r.json();
    rate = d.rates.TWD;
    localStorage.setItem('rate', rate);
    document.getElementById('rateVal').textContent = rate.toFixed(3);
    render();
  } catch { document.getElementById('rateVal').textContent = rate ? rate.toFixed(3) : '無法取得'; }
}

function jpy2twd(jpy) { return rate ? Math.round(jpy * rate) : null; }
function fmtJpy(n) { return '¥' + Number(n).toLocaleString(); }
function fmtTwd(n) { const t = jpy2twd(n); return t ? 'NT$' + t.toLocaleString() : ''; }

// Tab
function switchTab(tab, el) {
  currentTab = tab;
  ['summary','list','proxy','settle','settings'].forEach(t => document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none');
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', ['summary','list','proxy','settle','settings'][i]===tab));
  render();
}

// Render
function render() {
  renderSummary();
  renderList();
  renderProxy();
  renderSettle();
}

function renderProxy() {
  const el = document.getElementById('proxyList');
  if (!el) return;

  // Collect all proxy entries from expenses
  const allProxy = [];
  expenses.forEach(e => {
    if (e.proxyItems) {
      e.proxyItems.forEach(p => {
        allProxy.push({ ...p, expense: e });
      });
    }
  });

  if (!allProxy.length) {
    el.innerHTML = '<div class="empty">尚無代購紀錄<br>新增支出時開啟「幫別人代購」</div>';
    return;
  }

  // Group by person
  const byPerson = {};
  allProxy.forEach(p => {
    if (!byPerson[p.name]) byPerson[p.name] = [];
    byPerson[p.name].push(p);
  });

  el.innerHTML = Object.entries(byPerson).map(([name, items]) => {
    const total = items.reduce((s,i) => s+i.amount, 0);
    return `
      <div class="proxy-summary">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="font-size:15px;font-weight:600;color:var(--text)">👤 ${escH(name)}</div>
          <div style="text-align:right">
            <div style="font-size:16px;font-weight:700;color:var(--accent)">${fmtJpy(total)}</div>
            <div style="font-size:11px;color:var(--text2)">${fmtTwd(total)}</div>
          </div>
        </div>
        ${items.map(i => `
          <div class="proxy-item">
            <div class="proxy-item-icon">${CATS[i.expense.category]||'📌'}</div>
            <div class="proxy-item-info">
              <div class="proxy-item-name">${escH(i.expense.name)}</div>
              <div class="proxy-item-meta">${i.expense.date} · ${PEOPLE[i.expense.payer]?.name} 付款</div>
            </div>
            <div class="proxy-item-amt">${fmtJpy(i.amount)}</div>
          </div>`).join('')}
        <div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border);font-size:12px;color:var(--text2)">
          需向 ${escH(name)} 收回 ${fmtJpy(total)}（${fmtTwd(total)}）
        </div>
      </div>`;
  }).join('');
}

function renderSummary() {
  const total = expenses.reduce((s,e) => s+e.amount, 0);
  const pct = budget ? Math.min(total/budget*100, 100) : 0;
  const over = budget && total > budget;
  const warn = budget && total/budget > 0.8;

  document.getElementById('budgetCard').innerHTML = `
    <div class="budget-title">總花費</div>
    <div class="budget-main">
      <div class="budget-amount">${fmtJpy(total)}</div>
      <div class="budget-twd">${fmtTwd(total)}</div>
    </div>
    ${budget ? `
    <div class="progress-bar"><div class="progress-fill ${over?'over':warn?'warn':''}" style="width:${pct}%"></div></div>
    <div class="budget-labels">
      <span>已花 ${Math.round(pct)}%</span>
      <span>預算 ${fmtJpy(budget)}</span>
    </div>` : `<div style="font-size:12px;color:var(--text3)">尚未設定預算 — 前往「設定」設定</div>`}`;

  // Per person
  const weiTotal = expenses.reduce((s,e) => s + (e.splits?.wei||0)*e.amount/100, 0);
  const fatTotal = expenses.reduce((s,e) => s + (e.splits?.fat||0)*e.amount/100, 0);
  document.getElementById('personRow').innerHTML = `
    <div class="person-card">
      <div class="person-name"><span class="person-dot" style="background:var(--wei)"></span>威</div>
      <div class="person-amt" style="color:var(--wei)">${fmtJpy(Math.round(weiTotal))}</div>
      <div class="person-twd">${fmtTwd(Math.round(weiTotal))}</div>
    </div>
    <div class="person-card">
      <div class="person-name"><span class="person-dot" style="background:var(--fat)"></span>肥肥豬豬</div>
      <div class="person-amt" style="color:var(--fat)">${fmtJpy(Math.round(fatTotal))}</div>
      <div class="person-twd">${fmtTwd(Math.round(fatTotal))}</div>
    </div>`;

  // Category
  const catTotals = {};
  expenses.forEach(e => { catTotals[e.category] = (catTotals[e.category]||0) + e.amount; });
  const maxCat = Math.max(...Object.values(catTotals), 1);
  const sorted = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  document.getElementById('catSummary').innerHTML = sorted.length ? sorted.map(([cat, amt]) => `
    <div class="cat-row">
      <div class="cat-icon" style="background:${CAT_COLORS[cat]}22">${CATS[cat]||'📌'}</div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between">
          <span class="cat-name">${cat}</span>
          <span class="cat-amt">${fmtJpy(amt)}</span>
        </div>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${amt/maxCat*100}%;background:${CAT_COLORS[cat]||'var(--accent)'}"></div></div>
      </div>
    </div>`).join('') : '<div class="empty">尚無支出紀錄</div>';
}

function renderList() {
  if (!expenses.length) { document.getElementById('expenseList').innerHTML = '<div class="empty">尚無支出紀錄<br>點右上角 + 新增</div>'; return; }
  const byDay = {};
  [...expenses].sort((a,b) => b.date.localeCompare(a.date)).forEach(e => {
    if (!byDay[e.date]) byDay[e.date] = [];
    byDay[e.date].push(e);
  });
  document.getElementById('expenseList').innerHTML = Object.entries(byDay).map(([date, items]) => {
    const dayTotal = items.reduce((s,e)=>s+e.amount,0);
    const d = new Date(date+'T00:00:00');
    const dayStr = `${d.getMonth()+1}/${d.getDate()} (${['日','一','二','三','四','五','六'][d.getDay()]})`;
    return `<div class="day-header">${dayStr} — ${fmtJpy(dayTotal)}</div>` +
      items.map(e => `
        <div class="expense-item" onclick="openEdit('${e.id}')">
          <div class="expense-icon" style="background:${CAT_COLORS[e.category]||'#444'}22">${CATS[e.category]||'📌'}</div>
          <div class="expense-info">
            <div class="expense-name">${escH(e.name)}</div>
            <div class="expense-meta">
              <span style="color:${PEOPLE[e.payer]?.color}">${PEOPLE[e.payer]?.name}</span> 付
              ${e.note ? ` · ${escH(e.note)}` : ''}
            </div>
          </div>
          <div class="expense-amt">
            <div class="expense-jpy">${fmtJpy(e.amount)}</div>
            <div class="expense-twd">${fmtTwd(e.amount)}</div>
          </div>
        </div>`).join('');
  }).join('');
}

function renderSettle() {
  // Calculate who paid and who owes
  let weiPaid = 0, fatPaid = 0, weiOwes = 0, fatOwes = 0;
  expenses.forEach(e => {
    if (e.payer === 'wei') weiPaid += e.amount;
    else fatPaid += e.amount;
    weiOwes += (e.splits?.wei||0) * e.amount / 100;
    fatOwes += (e.splits?.fat||0) * e.amount / 100;
  });
  const weiBalance = weiPaid - weiOwes;
  const fatBalance = fatPaid - fatOwes;

  let html = '';
  if (!expenses.length) {
    html = '<div class="empty">尚無支出紀錄</div>';
  } else {
    html += `
      <div class="section-label">付款統計</div>
      <div class="person-row" style="margin-bottom:14px">
        <div class="person-card">
          <div class="person-name"><span class="person-dot" style="background:var(--wei)"></span>威 付了</div>
          <div class="person-amt" style="color:var(--wei)">${fmtJpy(Math.round(weiPaid))}</div>
          <div class="person-twd">${fmtTwd(Math.round(weiPaid))}</div>
        </div>
        <div class="person-card">
          <div class="person-name"><span class="person-dot" style="background:var(--fat)"></span>肥肥豬豬 付了</div>
          <div class="person-amt" style="color:var(--fat)">${fmtJpy(Math.round(fatPaid))}</div>
          <div class="person-twd">${fmtTwd(Math.round(fatPaid))}</div>
        </div>
      </div>
      <div class="section-label">應付金額</div>
      <div class="person-row" style="margin-bottom:14px">
        <div class="person-card">
          <div class="person-name"><span class="person-dot" style="background:var(--wei)"></span>威 應付</div>
          <div class="person-amt" style="color:var(--wei)">${fmtJpy(Math.round(weiOwes))}</div>
          <div class="person-twd">${fmtTwd(Math.round(weiOwes))}</div>
        </div>
        <div class="person-card">
          <div class="person-name"><span class="person-dot" style="background:var(--fat)"></span>肥肥豬豬 應付</div>
          <div class="person-amt" style="color:var(--fat)">${fmtJpy(Math.round(fatOwes))}</div>
          <div class="person-twd">${fmtTwd(Math.round(fatOwes))}</div>
        </div>
      </div>
      <div class="section-label">結算結果</div>`;

    if (Math.abs(weiBalance) < 1) {
      html += `<div class="settle-card" style="text-align:center;color:var(--green)">🎉 已平衡！不需要轉帳</div>`;
    } else if (weiBalance > 0) {
      // 威多付了，肥肥豬豬欠威
      const amt = Math.round(weiBalance);
      html += `<div class="settle-card">
        <div class="settle-arrow">
          <span class="settle-person" style="color:var(--fat)">肥肥豬豬</span>
          <i class="ti ti-arrow-right" style="color:var(--text3)"></i>
          <span class="settle-person" style="color:var(--wei)">威</span>
          <span class="settle-amt">${fmtJpy(amt)}</span>
        </div>
        <div class="settle-label">肥肥豬豬需還給威 ${fmtTwd(amt)}</div>
      </div>`;
    } else {
      // 肥肥豬豬多付了，威欠肥肥豬豬
      const amt = Math.round(Math.abs(weiBalance));
      html += `<div class="settle-card">
        <div class="settle-arrow">
          <span class="settle-person" style="color:var(--wei)">威</span>
          <i class="ti ti-arrow-right" style="color:var(--text3)"></i>
          <span class="settle-person" style="color:var(--fat)">肥肥豬豬</span>
          <span class="settle-amt">${fmtJpy(amt)}</span>
        </div>
        <div class="settle-label">威需還給肥肥豬豬 ${fmtTwd(amt)}</div>
      </div>`;
    }
  }
  document.getElementById('settleContent').innerHTML = html;
}

// Modal
function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新增支出';
  document.getElementById('expenseName').value = '';
  document.getElementById('expenseAmt').value = '';
  document.getElementById('expenseNote').value = '';
  document.getElementById('expenseDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('twdPreview').textContent = '';
  document.getElementById('delBtn').style.display = 'none';
  selectedCat = '餐飲'; selectedPayer = 'wei';
  splitWeiOn = true; splitFatOn = true;
  document.getElementById('splitWeiPct').value = 50;
  document.getElementById('splitFatPct').value = 50;
  updateSplitUI(); updatePayerUI(); updateCatUI();
  document.getElementById('modalBg').classList.add('show');
}

function openEdit(id) {
  const e = expenses.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '編輯支出';
  document.getElementById('expenseName').value = e.name;
  document.getElementById('expenseAmt').value = e.amount;
  document.getElementById('expenseNote').value = e.note || '';
  document.getElementById('expenseDate').value = e.date;
  document.getElementById('delBtn').style.display = 'block';
  selectedCat = e.category; selectedPayer = e.payer;
  splitWeiOn = (e.splits?.wei||0) > 0;
  splitFatOn = (e.splits?.fat||0) > 0;
  document.getElementById('splitWeiPct').value = e.splits?.wei ?? 50;
  document.getElementById('splitFatPct').value = e.splits?.fat ?? 50;
  updateSplitUI(); updatePayerUI(); updateCatUI(); updateTwdPreview();
  document.getElementById('modalBg').classList.add('show');
}

function closeModal() { document.getElementById('modalBg').classList.remove('show'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalBg')) closeModal(); }

function selectCat(btn) { selectedCat = btn.dataset.cat; updateCatUI(); }
function updateCatUI() {
  document.querySelectorAll('.cat-pick-btn').forEach(b => b.classList.toggle('selected', b.dataset.cat===selectedCat));
}
function selectPayer(p) { selectedPayer = p; updatePayerUI(); }
function updatePayerUI() {
  document.getElementById('payerWei').className = 'payer-btn' + (selectedPayer==='wei'?' selected-wei':'');
  document.getElementById('payerFat').className = 'payer-btn' + (selectedPayer==='fat'?' selected-fat':'');
}
function toggleSplit(who) {
  if (who==='wei') splitWeiOn = !splitWeiOn;
  else splitFatOn = !splitFatOn;
  updateSplitUI();
  syncPct();
}
function updateSplitUI() {
  document.getElementById('splitWeiCheck').className = 'split-check' + (splitWeiOn?' on':'');
  document.getElementById('splitFatCheck').className = 'split-check' + (splitFatOn?' on':'');
  document.getElementById('splitWeiCheck').innerHTML = splitWeiOn ? '✓' : '';
  document.getElementById('splitFatCheck').innerHTML = splitFatOn ? '✓' : '';
  document.getElementById('splitWeiPct').disabled = !splitWeiOn;
  document.getElementById('splitFatPct').disabled = !splitFatOn;
}
function syncSplit(who) {
  if (!splitWeiOn || !splitFatOn) return;
  const weiV = parseInt(document.getElementById('splitWeiPct').value)||0;
  const fatV = parseInt(document.getElementById('splitFatPct').value)||0;
  if (who==='wei') document.getElementById('splitFatPct').value = Math.max(0, 100-weiV);
  else document.getElementById('splitWeiPct').value = Math.max(0, 100-fatV);
}
function syncPct() {
  if (splitWeiOn && splitFatOn) { document.getElementById('splitWeiPct').value=50; document.getElementById('splitFatPct').value=50; }
  else if (splitWeiOn) { document.getElementById('splitWeiPct').value=100; document.getElementById('splitFatPct').value=0; }
  else if (splitFatOn) { document.getElementById('splitWeiPct').value=0; document.getElementById('splitFatPct').value=100; }
  else { document.getElementById('splitWeiPct').value=0; document.getElementById('splitFatPct').value=0; }
}

function updateTwdPreview() {
  const v = parseInt(document.getElementById('expenseAmt').value)||0;
  document.getElementById('twdPreview').textContent = v && rate ? `≈ NT$${Math.round(v*rate).toLocaleString()}` : '';
}

function saveExpense() {
  const name = document.getElementById('expenseName').value.trim();
  const amt = parseInt(document.getElementById('expenseAmt').value)||0;
  const date = document.getElementById('expenseDate').value;
  if (!name) { alert('請輸入項目名稱'); return; }
  if (!amt) { alert('請輸入金額'); return; }
  const weiPct = parseInt(document.getElementById('splitWeiPct').value)||0;
  const fatPct = parseInt(document.getElementById('splitFatPct').value)||0;
  const expense = {
    id: editingId || Date.now().toString(),
    name, amount: amt, category: selectedCat,
    payer: selectedPayer, date,
    note: document.getElementById('expenseNote').value.trim(),
    splits: { wei: weiPct, fat: fatPct }
  };
  if (editingId) {
    const idx = expenses.findIndex(e=>e.id===editingId);
    if (idx >= 0) expenses[idx] = expense;
  } else {
    expenses.push(expense);
  }
  localStorage.setItem('expenses', JSON.stringify(expenses));
  closeModal(); render();
}

function deleteExpense() {
  if (!confirm('確定刪除？')) return;
  expenses = expenses.filter(e => e.id !== editingId);
  localStorage.setItem('expenses', JSON.stringify(expenses));
  closeModal(); render();
}

function saveBudget() {
  budget = parseInt(document.getElementById('budgetInput').value)||0;
  localStorage.setItem('budget', budget);
  render();
  alert('預算已儲存！');
}

function exportData() {
  const data = JSON.stringify({ expenses, budget, rate }, null, 2);
  navigator.clipboard.writeText(data).then(()=>alert('已複製到剪貼板！')).catch(()=>alert(data));
}

function clearAllData() {
  if (!confirm('確定清除所有資料？這個動作無法復原。')) return;
  expenses = []; budget = 0;
  localStorage.removeItem('expenses');
  localStorage.removeItem('budget');
  render();
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
